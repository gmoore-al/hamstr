name: Deploy

# Runs on every push to main (i.e. when a PR is merged).
# Also has a manual trigger button in the GitHub Actions UI.
#
# Architecture:
#   - Railway (API) and Vercel (web) both watch this repo and
#     auto-deploy whenever main changes — no Actions steps needed
#     for them.
#   - This workflow's only job is to run Alembic migrations against
#     Supabase so the DB schema is always up to date before the new
#     API container comes online. Railway builds take ~2-3 min, so
#     the 30-second migration step completes first in practice.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Run Alembic migrations
        working-directory: api
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
